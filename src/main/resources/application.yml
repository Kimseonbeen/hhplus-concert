  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:10000,localhost:10001,localhost:10002
